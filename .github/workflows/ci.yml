name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-and-test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            extension/package-lock.json
            engine/intelligence/package-lock.json
            website/package-lock.json
            mcp/package-lock.json

      - name: Install root deps
        run: npm ci || npm install

      - name: Install engine deps
        working-directory: engine/intelligence
        run: npm ci || npm install

      - name: Install extension deps
        working-directory: extension
        run: npm ci || npm install

      - name: Build engine
        working-directory: engine/intelligence
        run: npm run build

      - name: Unit tests (engine / core)
        working-directory: engine/intelligence
        run: npm test

      - name: Typecheck extension
        working-directory: extension
        run: npm run lint

      - name: Unit tests (extension)
        working-directory: extension
        run: npm test

      - name: Validate rule packs
        run: npm run validate:packs

  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: typecheck-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            extension/package-lock.json
            engine/intelligence/package-lock.json

      - name: Install engine deps
        working-directory: engine/intelligence
        run: npm ci || npm install

      - name: Install extension deps
        working-directory: extension
        run: npm ci || npm install

      - name: Package VSIX
        working-directory: extension
        run: npm run package

      - name: Upload VSIX artefact
        uses: actions/upload-artifact@v4
        with:
          name: mergecore-vsix
          path: extension/*.vsix
          if-no-files-found: error

  mcp:
    name: MCP typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            mcp/package-lock.json
            engine/intelligence/package-lock.json

      - name: Install engine deps
        working-directory: engine/intelligence
        run: npm ci || npm install

      - name: Build engine
        working-directory: engine/intelligence
        run: npm run build

      - name: Install MCP deps
        working-directory: mcp
        run: npm ci || npm install

      - name: Typecheck MCP
        working-directory: mcp
        run: npm run lint

  website:
    name: Website build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website deps
        working-directory: website
        run: npm ci || npm install

      - name: Build website (lint included)
        working-directory: website
        run: npm run build

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit — extension
        working-directory: extension
        run: npm audit --omit=dev --audit-level=high || true

      - name: npm audit — website
        working-directory: website
        run: npm audit --omit=dev --audit-level=high || true

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
